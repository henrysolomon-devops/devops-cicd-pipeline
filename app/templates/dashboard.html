<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps CI/CD Pipeline - Dashboard</title>
    <style>
        body {
            font-family: -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 2.5rem 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
            min-width: 320px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #38bdf8;
        }
        .row {
            display: flex;
            justify-content: space-between;
            gap: 2rem;
            margin: 0.6rem 0;
            font-size: 0.95rem;
        }
        .label {
            color: #94a3b8;
        }
        .value {
            font-weight: 600;
            color: #f1f5f9;
        }
        .status-value {
            font-weight: 700;
            color: #22c55e;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 6px;
        }
        .badge {
            display: inline-block;
            background: #22c55e;
            color: #052e16;
            border-radius: 999px;
            padding: 0.2rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 1.2rem;
        }
        hr {
            border: none;
            border-top: 1px solid #334155;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>DevOps CI/CD Pipeline</h1>
        <div class="row"><span class="label">Version</span><span class="value">{{ version }}</span></div>
        <div class="row"><span class="label">Hostname</span><span class="value">{{ hostname }}</span></div>
        <div class="row"><span class="label">Server time (UTC)</span><span class="value">{{ timestamp }}</span></div>
        <hr>
        <div class="row">
            <span class="label">Health check (/health)</span>
            <span class="status-value"><span class="dot"></span>{{ health_status }}</span>
        </div>
        <div class="badge">RUNNING</div>
    </div>
</body>
</html>
